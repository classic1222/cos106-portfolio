<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="tcjTitle">
  <title id="tcjTitle">Abstract audio waveform illustration for TopcityJam Media</title>
  <defs>
    <linearGradient id="tcjBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10151f"/>
      <stop offset="100%" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="tcjBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5c8f"/>
      <stop offset="100%" stop-color="#f70f5d"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#tcjBg)"/>

  <!-- faint grid, matches site background texture -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
  </g>

  <!-- waveform bars, varying heights to suggest an audio player -->
  <g>
    <rect x="60"  y="150" width="14" height="40"  rx="7" fill="url(#tcjBar)" opacity="0.5"/>
    <rect x="90"  y="110" width="14" height="120" rx="7" fill="url(#tcjBar)" opacity="0.7"/>
    <rect x="120" y="80"  width="14" height="180" rx="7" fill="url(#tcjBar)"/>
    <rect x="150" y="130" width="14" height="80"  rx="7" fill="url(#tcjBar)" opacity="0.8"/>
    <rect x="180" y="60"  width="14" height="220" rx="7" fill="url(#tcjBar)"/>
    <rect x="210" y="100" width="14" height="140" rx="7" fill="url(#tcjBar)" opacity="0.85"/>
    <rect x="240" y="40"  width="14" height="260" rx="7" fill="url(#tcjBar)"/>
    <rect x="270" y="90"  width="14" height="160" rx="7" fill="url(#tcjBar)" opacity="0.75"/>
    <rect x="300" y="120" width="14" height="100" rx="7" fill="url(#tcjBar)" opacity="0.6"/>
    <rect x="330" y="70"  width="14" height="200" rx="7" fill="url(#tcjBar)"/>
    <rect x="360" y="110" width="14" height="120" rx="7" fill="url(#tcjBar)" opacity="0.7"/>
    <rect x="390" y="140" width="14" height="60"  rx="7" fill="url(#tcjBar)" opacity="0.5"/>
    <rect x="420" y="90"  width="14" height="160" rx="7" fill="url(#tcjBar)" opacity="0.8"/>
    <rect x="450" y="130" width="14" height="80"  rx="7" fill="url(#tcjBar)" opacity="0.6"/>
    <rect x="480" y="100" width="14" height="140" rx="7" fill="url(#tcjBar)" opacity="0.7"/>
    <rect x="510" y="150" width="14" height="40"  rx="7" fill="url(#tcjBar)" opacity="0.4"/>
  </g>

  <!-- play button, centred over the waveform -->
  <circle cx="300" cy="170" r="34" fill="#05070c" stroke="#f70f5d" stroke-width="2"/>
  <path d="M292 155 L318 170 L292 185 Z" fill="#ff5c8f"/>
</svg>
