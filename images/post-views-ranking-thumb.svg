<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pvrTitle">
  <title id="pvrTitle">Abstract ranking chart illustration for the Post Views Ranking plugin</title>
  <defs>
    <linearGradient id="pvrBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10151f"/>
      <stop offset="100%" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="pvrBar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5c8f"/>
      <stop offset="100%" stop-color="#f70f5d"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#pvrBg)"/>

  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
  </g>

  <!-- ranking podium: three bars of different heights, like a leaderboard -->
  <rect x="150" y="150" width="90" height="130" rx="6" fill="var(--unused)" opacity="0"/>

  <rect x="120" y="170" width="90" height="110" rx="8" fill="url(#pvrBar1)" opacity="0.55"/>
  <text x="165" y="230" text-anchor="middle" font-family="monospace" font-size="28" fill="#0a0e16">2</text>

  <rect x="255" y="110" width="90" height="170" rx="8" fill="url(#pvrBar1)"/>
  <text x="300" y="200" text-anchor="middle" font-family="monospace" font-size="30" fill="#0a0e16">1</text>

  <rect x="390" y="195" width="90" height="85" rx="8" fill="url(#pvrBar1)" opacity="0.4"/>
  <text x="435" y="245" text-anchor="middle" font-family="monospace" font-size="26" fill="#0a0e16">3</text>

  <!-- little eye/view icons above each bar to suggest "post views" -->
  <g stroke="#eef1f6" stroke-width="2" fill="none" opacity="0.8">
    <ellipse cx="165" cy="150" rx="14" ry="8"/>
    <circle cx="165" cy="150" r="3.5" fill="#eef1f6"/>

    <ellipse cx="300" cy="90" rx="14" ry="8"/>
    <circle cx="300" cy="90" r="3.5" fill="#eef1f6"/>

    <ellipse cx="435" cy="175" rx="14" ry="8"/>
    <circle cx="435" cy="175" r="3.5" fill="#eef1f6"/>
  </g>
</svg>
